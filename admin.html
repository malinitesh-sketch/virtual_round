<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Traveloop Admin</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .data-table th, .data-table td { padding: 12px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .data-table th { color: var(--text-secondary); font-weight: 500; }
    </style>
</head>
<body>
    <div class="app-container" style="max-width: 800px;">
        <div class="app-header">
            <h1>Admin Dashboard</h1>
            <a href="index.html" style="color: #ef4444; font-size: 14px; text-decoration: none;">Log Out</a>
        </div>
        
        <div class="content-area">
            <h2 style="font-size: 20px; margin-bottom: 16px;">Platform Usage</h2>
            <div class="grid-2col" style="margin-bottom: 24px;">
                <div class="card" style="text-align: center;">
                    <h4 style="font-size: 32px; color: var(--color-4); margin-bottom: 8px;">1,204</h4>
                    <p style="font-size: 14px; color: var(--text-secondary);">Total Active Users</p>
                </div>
                <div class="card" style="text-align: center;">
                    <h4 style="font-size: 32px; color: var(--color-3); margin-bottom: 8px;">8,450</h4>
                    <p style="font-size: 14px; color: var(--text-secondary);">Trips Created</p>
                </div>
            </div>
            
            <h2 style="font-size: 20px; margin-bottom: 16px;">Top Destinations</h2>
            <div class="card" style="padding: 10px 0; overflow-x: auto;">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>City</th>
                            <th>Country</th>
                            <th>Total Additions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>Paris</td>
                            <td>France</td>
                            <td>3,200</td>
                        </tr>
                        <tr>
                            <td>Tokyo</td>
                            <td>Japan</td>
                            <td>2,800</td>
                        </tr>
                        <tr>
                            <td>New York</td>
                            <td>USA</td>
                            <td>2,100</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
