<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Itinerary Builder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <div class="app-header">
            <a href="my-trips.html" style="color: var(--text-primary);">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            </a>
            <h1>Itinerary Builder</h1>
            <div style="width: 24px;"></div>
        </div>
        
        <div class="content-area">
            <h2 style="font-size: 18px; margin-bottom: 16px;">Euro Trip 2026</h2>
            
            <div class="card" style="padding: 16px; margin-bottom: 16px; border: 1px solid var(--color-2);">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                    <h4 style="font-size: 16px;">1. Paris, France</h4>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                </div>
                <div style="display: flex; gap: 8px; margin-bottom: 12px;">
                    <input type="date" class="form-group" style="padding: 8px; border-radius: 6px; border: 1px solid var(--input-border); background: var(--input-bg); color: white; width: 100%;">
                    <input type="date" class="form-group" style="padding: 8px; border-radius: 6px; border: 1px solid var(--input-border); background: var(--input-bg); color: white; width: 100%;">
                </div>
                <p style="font-size: 12px; color: var(--text-secondary); margin-bottom: 8px;">2 Activities Planned</p>
                <a href="activity-search.html" class="btn btn-secondary" style="padding: 8px; font-size: 13px;">+ Add Activity</a>
            </div>

            <div class="card" style="padding: 16px; margin-bottom: 16px; border: 1px solid var(--color-2);">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                    <h4 style="font-size: 16px;">2. Rome, Italy</h4>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                </div>
                <div style="display: flex; gap: 8px; margin-bottom: 12px;">
                    <input type="date" class="form-group" style="padding: 8px; border-radius: 6px; border: 1px solid var(--input-border); background: var(--input-bg); color: white; width: 100%;">
                    <input type="date" class="form-group" style="padding: 8px; border-radius: 6px; border: 1px solid var(--input-border); background: var(--input-bg); color: white; width: 100%;">
                </div>
                <p style="font-size: 12px; color: var(--text-secondary); margin-bottom: 8px;">0 Activities Planned</p>
                <a href="activity-search.html" class="btn btn-secondary" style="padding: 8px; font-size: 13px;">+ Add Activity</a>
            </div>
            
            <a href="city-search.html" class="card" style="display: flex; align-items: center; justify-content: center; padding: 20px; border: 2px dashed var(--color-3); background: transparent; text-decoration: none; color: var(--text-primary);">
                + Add Another Stop
            </a>
            
            <a href="itinerary-view.html" class="btn" style="margin-top: 16px;">Preview Itinerary</a>
        </div>
    </div>
</body>
</html>
