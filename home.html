<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Traveloop - Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <div class="app-header">
            <div>
                <p style="font-size: 12px; color: var(--text-secondary);">Welcome back,</p>
                <h1>Traveler!</h1>
            </div>
            <a href="profile.html" style="color: var(--text-primary);">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            </a>
        </div>
        
        <div class="content-area">
            <a href="create-trip.html" class="btn" style="margin-bottom: 24px; display: flex; align-items: center; justify-content: center; gap: 8px;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                Plan New Trip
            </a>
            
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                <h3 style="font-size: 16px;">Upcoming Trips</h3>
                <a href="my-trips.html" style="font-size: 12px; color: var(--color-4); text-decoration: none;">View All</a>
            </div>
            <div class="card" style="padding: 16px; margin-bottom: 24px; border-left: 4px solid var(--color-3);">
                <h4 style="margin-bottom: 4px;">Euro Trip 2026</h4>
                <p style="font-size: 12px; color: var(--text-secondary); margin-bottom: 12px;">Paris • Rome • Berlin | Starts in 14 days</p>
                <div style="display: flex; justify-content: space-between; font-size: 13px;">
                    <span>Budget: <span style="color: #10b981;">$4,500</span></span>
                    <a href="itinerary-view.html" style="color: var(--color-4); text-decoration: none;">View Itinerary &rarr;</a>
                </div>
            </div>

            <h3 style="margin-bottom: 12px; font-size: 16px;">Popular Destinations</h3>
            <div class="horizontal-scroll" style="margin-bottom: 24px;">
                <div class="scroll-item" style="background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.7)), var(--color-2); flex-direction: column;">
                    <span style="font-weight: bold;">Tokyo</span>
                    <span style="font-size: 10px; color: #ccc;">Japan</span>
                </div>
                <div class="scroll-item" style="background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.7)), var(--color-3); flex-direction: column;">
                    <span style="font-weight: bold;">New York</span>
                    <span style="font-size: 10px; color: #ccc;">USA</span>
                </div>
                <div class="scroll-item" style="background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.7)), var(--color-1); flex-direction: column;">
                    <span style="font-weight: bold;">Bali</span>
                    <span style="font-size: 10px; color: #ccc;">Indonesia</span>
                </div>
            </div>
        </div>

        <div class="bottom-nav">
            <a href="home.html" class="nav-item active">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                Home
            </a>
            <a href="my-trips.html" class="nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                My Trips
            </a>
            <a href="city-search.html" class="nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                Discover
            </a>
            <a href="profile.html" class="nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                Profile
            </a>
        </div>
    </div>
</body>
</html>
