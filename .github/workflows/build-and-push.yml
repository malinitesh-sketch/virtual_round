name: Build and push Docker images

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: {}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions: write-all

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/traveloop-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/traveloop-backend:${{ github.sha }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/traveloop-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/traveloop-frontend:${{ github.sha }}

      - name: Output image names
        run: |
          echo "Backend image: ${{ secrets.DOCKERHUB_USERNAME }}/traveloop-backend:${{ github.sha }}"
          echo "Frontend image: ${{ secrets.DOCKERHUB_USERNAME }}/traveloop-frontend:${{ github.sha }}"
