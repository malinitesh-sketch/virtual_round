version: '3.8'

services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: traveloop
      MYSQL_USER: traveloop
      MYSQL_PASSWORD: travelooppass
    volumes:
      - db-data:/var/lib/mysql
      - ./backend/db-setup.sql:/docker-entrypoint-initdb.d/db-setup.sql:ro
    ports:
      - "3306:3306"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/.env.template
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USER=traveloop
      - DB_PASS=travelooppass
      - DB_NAME=traveloop
      - PORT=5000
      - JWT_SECRET=change_this_secret
      - NODE_ENV=production
    ports:
      - "5000:5000"
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  db-data:
