<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Traveloop - Create your travel account">
    <title>Traveloop — Register</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <!-- ===== REGISTRATION PAGE ===== -->
    <div class="auth-page">
        <div class="auth-card float-slow" style="max-width:520px;">
            <h2><i class="fa-solid fa-paper-plane"></i> Traveloop</h2>
            <p class="subtitle">Create your travel account</p>

            <form id="register-form">
                <!-- Photo placeholder -->
                <div style="text-align:center;margin-bottom:1.5rem;">
                    <div class="avatar-lg" style="margin:0 auto;cursor:pointer;" id="reg-photo">
                        <i class="fa-solid fa-camera" style="font-size:1.5rem;"></i>
                    </div>
                    <p style="font-size:.75rem;color:var(--text-muted);margin-top:8px;">Upload Photo</p>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="reg-firstname"><i class="fa-solid fa-user"></i> First Name</label>
                        <input type="text" id="reg-firstname" class="form-control" placeholder="James">
                    </div>
                    <div class="form-group">
                        <label for="reg-lastname">Last Name</label>
                        <input type="text" id="reg-lastname" class="form-control" placeholder="Anderson">
                    </div>
                </div>
                <div class="form-group">
                    <label for="reg-email"><i class="fa-solid fa-envelope"></i> Email Address</label>
                    <input type="email" id="reg-email" class="form-control" placeholder="james@example.com">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="reg-phone"><i class="fa-solid fa-phone"></i> Phone Number</label>
                        <input type="tel" id="reg-phone" class="form-control" placeholder="+1 234 567 890">
                    </div>
                    <div class="form-group">
                        <label for="reg-city"><i class="fa-solid fa-city"></i> City</label>
                        <input type="text" id="reg-city" class="form-control" placeholder="New York">
                    </div>
                </div>
                <div class="form-group">
                    <label for="reg-country"><i class="fa-solid fa-globe"></i> Country</label>
                    <select id="reg-country" class="form-control">
                        <option value="">Select Country</option>
                        <option>United States</option>
                        <option>United Kingdom</option>
                        <option>India</option>
                        <option>France</option>
                        <option>Germany</option>
                        <option>Japan</option>
                        <option>Australia</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="reg-info">Additional Information</label>
                    <textarea id="reg-info" class="form-control" rows="3" placeholder="Tell us about your travel interests..."></textarea>
                </div>
                <a href="index.html" class="btn btn-primary" style="width:100%;justify-content:center;" id="reg-submit-btn">
                    <i class="fa-solid fa-user-plus"></i> Register
                </a>
            </form>

            <p class="auth-footer">
                Already have an account? <a href="login.html" id="reg-to-login">Login here</a>
            </p>
        </div>
    </div>
</body>
</html>
