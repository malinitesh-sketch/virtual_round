<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>City Search</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <div class="app-header">
            <h1>Discover Cities</h1>
        </div>
        
        <div class="content-area">
            <div class="form-group" style="margin-bottom: 24px;">
                <input type="text" placeholder="Search for a city or country...">
            </div>
            
            <div style="display: flex; gap: 8px; margin-bottom: 24px; overflow-x: auto; padding-bottom: 8px;">
                <span style="background: var(--color-2); padding: 6px 12px; border-radius: 20px; font-size: 12px; white-space: nowrap;">Europe</span>
                <span style="background: var(--input-bg); padding: 6px 12px; border-radius: 20px; font-size: 12px; white-space: nowrap; border: 1px solid var(--input-border);">Asia</span>
                <span style="background: var(--input-bg); padding: 6px 12px; border-radius: 20px; font-size: 12px; white-space: nowrap; border: 1px solid var(--input-border);">Americas</span>
                <span style="background: var(--input-bg); padding: 6px 12px; border-radius: 20px; font-size: 12px; white-space: nowrap; border: 1px solid var(--input-border);">Budget Friendly</span>
            </div>
            
            <div class="card" style="padding: 0; overflow: hidden; margin-bottom: 16px;">
                <div style="height: 120px; background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.8)), var(--color-1); display: flex; align-items: flex-end; padding: 16px;">
                    <div>
                        <h3 style="font-size: 18px;">London</h3>
                        <p style="font-size: 12px; color: #ccc;">United Kingdom</p>
                    </div>
                </div>
                <div style="padding: 16px;">
                    <p style="font-size: 13px; color: var(--text-secondary); margin-bottom: 12px;">Popularity: High | Cost Index: $$$$</p>
                    <button class="btn btn-secondary" style="padding: 8px; font-size: 14px;">+ Add to Trip</button>
                </div>
            </div>
            
            <div class="card" style="padding: 0; overflow: hidden; margin-bottom: 16px;">
                <div style="height: 120px; background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.8)), var(--color-3); display: flex; align-items: flex-end; padding: 16px;">
                    <div>
                        <h3 style="font-size: 18px;">Barcelona</h3>
                        <p style="font-size: 12px; color: #ccc;">Spain</p>
                    </div>
                </div>
                <div style="padding: 16px;">
                    <p style="font-size: 13px; color: var(--text-secondary); margin-bottom: 12px;">Popularity: High | Cost Index: $$$</p>
                    <button class="btn btn-secondary" style="padding: 8px; font-size: 14px;">+ Add to Trip</button>
                </div>
            </div>
        </div>

        <div class="bottom-nav">
            <a href="home.html" class="nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                Home
            </a>
            <a href="my-trips.html" class="nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                My Trips
            </a>
            <a href="city-search.html" class="nav-item active">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                Discover
            </a>
            <a href="profile.html" class="nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                Profile
            </a>
        </div>
    </div>
</body>
</html>
