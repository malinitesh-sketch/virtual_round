<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Traveloop - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container" style="justify-content: center; align-items: center;">
        <div class="login-container">
            <div class="card" style="padding: 40px; text-align: center;">
                <div class="logo-circle" style="background: linear-gradient(135deg, var(--color-2), var(--color-4)); margin-bottom: 16px;">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>
                    </svg>
                </div>
                <h1 style="font-size: 28px; margin-bottom: 8px;">Traveloop</h1>
                <p style="color: var(--text-secondary); font-size: 14px; margin-bottom: 32px;">Personalized Travel Planning Made Easy</p>
                
                <form action="home.html" method="GET" style="text-align: left;">
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" placeholder="Enter your email" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" placeholder="Enter your password" required>
                    </div>
                    <div style="text-align: right; margin-bottom: 16px;">
                        <a href="#" style="color: var(--color-4); font-size: 12px; text-decoration: none;">Forgot Password?</a>
                    </div>
                    <button type="submit" class="btn">Login to Traveloop</button>
                </form>
                <p class="signup-prompt">Don't have an account? <a href="register.html">Sign Up</a></p>
            </div>
        </div>
    </div>
</body>
</html>
