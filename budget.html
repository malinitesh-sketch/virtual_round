<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trip Budget</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <div class="app-header">
            <a href="itinerary-view.html" style="color: var(--text-primary);">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            </a>
            <h1>Cost Breakdown</h1>
            <div style="width: 24px;"></div>
        </div>
        
        <div class="content-area">
            <div class="card" style="text-align: center;">
                <h3 style="font-size: 16px; margin-bottom: 8px;">Estimated Total Cost</h3>
                <h2 style="font-size: 32px; color: #10b981; margin-bottom: 24px;">$4,500</h2>
                
                <div class="chart-placeholder" style="border-radius: 50%; width: 150px; height: 150px; margin: 0 auto 24px; background: conic-gradient(var(--color-2) 0% 40%, var(--color-3) 40% 70%, var(--color-4) 70% 90%, #f43f5e 90% 100%); border: none;">
                </div>
                
                <div style="display: flex; justify-content: center; gap: 16px; font-size: 12px; color: var(--text-secondary); flex-wrap: wrap;">
                    <span><span style="display: inline-block; width: 10px; height: 10px; background: var(--color-2); border-radius: 50%;"></span> Flights ($1800)</span>
                    <span><span style="display: inline-block; width: 10px; height: 10px; background: var(--color-3); border-radius: 50%;"></span> Stay ($1350)</span>
                    <span><span style="display: inline-block; width: 10px; height: 10px; background: var(--color-4); border-radius: 50%;"></span> Food ($900)</span>
                    <span><span style="display: inline-block; width: 10px; height: 10px; background: #f43f5e; border-radius: 50%;"></span> Activities ($450)</span>
                </div>
            </div>
            
            <div class="card">
                <h3 style="margin-bottom: 16px;">Daily Average</h3>
                <p style="font-size: 20px; font-weight: bold;">$450 <span style="font-size: 14px; font-weight: normal; color: var(--text-secondary);">/ day</span></p>
                <div style="background: rgba(244, 63, 94, 0.1); border-left: 4px solid #f43f5e; padding: 12px; margin-top: 16px; font-size: 13px; border-radius: 4px;">
                    <strong>Alert:</strong> Day 2 (Paris) is 20% over your daily budget limit.
                </div>
            </div>
        </div>

        <div class="bottom-nav" style="justify-content: space-around;">
            <a href="itinerary-view.html" class="nav-item"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>Itinerary</a>
            <a href="budget.html" class="nav-item active"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>Budget</a>
            <a href="checklist.html" class="nav-item"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 11 12 14 22 4"></polyline><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path></svg>Checklist</a>
            <a href="notes.html" class="nav-item"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>Notes</a>
        </div>
    </div>
</body>
</html>
