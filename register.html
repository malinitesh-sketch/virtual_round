<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Traveloop - Sign Up</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container" style="justify-content: center; align-items: center;">
        <div class="login-container">
            <div class="card" style="padding: 40px;">
                <h2 style="text-align: center; margin-bottom: 8px;">Join Traveloop</h2>
                <p style="text-align: center; color: var(--text-secondary); font-size: 14px; margin-bottom: 24px;">Start planning your dream trips.</p>
                <form action="home.html" method="GET">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" placeholder="John Doe" required>
                    </div>
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" placeholder="john@example.com" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" placeholder="Create a password" required>
                    </div>
                    <button type="submit" class="btn" style="margin-top: 10px;">Create Account</button>
                </form>
                <p class="signup-prompt">Already have an account? <a href="index.html">Log In</a></p>
            </div>
        </div>
    </div>
</body>
</html>
