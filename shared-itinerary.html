<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shared Itinerary</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <div class="app-header" style="justify-content: center;">
            <h1>Euro Trip - Public View</h1>
        </div>
        
        <div class="content-area">
            <div class="banner-image" style="background: linear-gradient(135deg, var(--color-2), var(--color-1)); margin-bottom: 24px;">
                Euro Trip 2026
            </div>
            
            <p style="text-align: center; color: var(--text-secondary); margin-bottom: 24px;">Created by John Doe • 10 Days • 3 Cities</p>
            
            <div class="card" style="margin-bottom: 24px;">
                <h3 style="margin-bottom: 12px; font-size: 16px;">Day 1: Paris</h3>
                <ul style="padding-left: 20px; font-size: 14px; line-height: 1.8; color: var(--text-secondary);">
                    <li>10:00 AM - Eiffel Tower Visit</li>
                    <li>1:30 PM - Lunch at Le Jules Verne</li>
                </ul>
            </div>
            
            <div class="card" style="margin-bottom: 24px;">
                <h3 style="margin-bottom: 12px; font-size: 16px;">Day 2: Paris</h3>
                <ul style="padding-left: 20px; font-size: 14px; line-height: 1.8; color: var(--text-secondary);">
                    <li>9:00 AM - Louvre Museum</li>
                </ul>
            </div>
            
            <button class="btn" style="margin-bottom: 12px;">Copy This Trip to Traveloop</button>
            <div style="text-align: center; font-size: 12px; color: var(--text-secondary);">
                <a href="#" style="color: var(--color-4); text-decoration: none;">Share on Social Media</a>
            </div>
        </div>
    </div>
</body>
</html>
