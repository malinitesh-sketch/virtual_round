<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Traveloop</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <!-- Main container with split-screen layout -->
    <div class="login-container">
        
        <!-- Left Section: Travel Image Placeholder -->
        <div class="image-section">
            <div class="image-placeholder">
                <div class="placeholder-content">
                    <h2>Explore the World</h2>
                    <p>Start your journey with Traveloop</p>
                </div>
            </div>
        </div>

        <!-- Right Section: Login Form -->
        <div class="form-section">
            <div class="form-card">
                <!-- Logo/Brand Name -->
                <div class="brand">
                    <h1>Traveloop</h1>
                    <p class="tagline">Your travel companion</p>
                </div>

                <!-- Welcome Message -->
                <h2 class="form-title">Welcome Back</h2>
                <p class="form-subtitle">Log in to continue your adventures</p>

                <!-- Login Form -->
                <form class="login-form">
                    
                    <!-- Email Input -->
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input 
                            type="email" 
                            id="email" 
                            name="email" 
                            placeholder="you@example.com" 
                            required
                        >
                    </div>

                    <!-- Password Input -->
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            placeholder="••••••••" 
                            required
                        >
                    </div>

                    <!-- Login Button (Call-to-Action) -->
                    <button type="submit" class="btn-login">Login</button>
                </form>

                <!-- Additional Links -->
                <div class="form-links">
                    <a href="#forgot-password" class="link-forgot">Forgot Password?</a>
                </div>

                <!-- Sign Up Link -->
                <div class="signup-section">
                    <p>Don't have an account? 
                        <a href="register.html" class="link-signup">Sign Up</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
