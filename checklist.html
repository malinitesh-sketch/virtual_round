<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Packing Checklist</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .check-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .check-item input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--color-3); }
        .check-item.packed span { text-decoration: line-through; color: var(--text-secondary); }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="app-header">
            <a href="itinerary-view.html" style="color: var(--text-primary);">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            </a>
            <h1>Packing List</h1>
            <div style="width: 24px;"></div>
        </div>
        
        <div class="content-area">
            <div class="form-group" style="display: flex; flex-direction: row; gap: 8px; margin-bottom: 24px;">
                <input type="text" placeholder="Add new item..." style="flex: 1;">
                <button class="btn" style="width: auto; padding: 12px 16px;">Add</button>
            </div>
            
            <h3 style="font-size: 14px; color: var(--text-secondary); margin-bottom: 8px;">Documents</h3>
            <div class="card" style="padding: 0 16px; margin-bottom: 24px;">
                <div class="check-item packed">
                    <input type="checkbox" checked>
                    <span>Passport</span>
                </div>
                <div class="check-item">
                    <input type="checkbox">
                    <span>Flight Tickets</span>
                </div>
            </div>

            <h3 style="font-size: 14px; color: var(--text-secondary); margin-bottom: 8px;">Clothing</h3>
            <div class="card" style="padding: 0 16px; margin-bottom: 24px;">
                <div class="check-item">
                    <input type="checkbox">
                    <span>Walking Shoes</span>
                </div>
                <div class="check-item">
                    <input type="checkbox">
                    <span>Light Jacket</span>
                </div>
            </div>
            
            <div style="text-align: center;">
                <button class="btn btn-secondary" style="font-size: 12px; padding: 8px 16px; width: auto;">Reset Checklist</button>
            </div>
        </div>

        <div class="bottom-nav" style="justify-content: space-around;">
            <a href="itinerary-view.html" class="nav-item"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>Itinerary</a>
            <a href="budget.html" class="nav-item"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>Budget</a>
            <a href="checklist.html" class="nav-item active"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 11 12 14 22 4"></polyline><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path></svg>Checklist</a>
            <a href="notes.html" class="nav-item"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>Notes</a>
        </div>
    </div>
</body>
</html>
